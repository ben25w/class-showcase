<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrap" id="pageWrap">
    <div class="bg-watercolor"></div>

    <div class="content">
      <header class="home-header">
        <button class="back-btn" id="backBtn" style="margin-bottom:0.75rem">&#8592; All Classes</button>
        <h1 class="home-title" id="classTitle">Loading…</h1>
        <p class="home-subtitle" id="classSubtitle">Tap a name to see their creations</p>

      <main class="bubble-grid" id="bubbleGrid">
        <!-- Bubbles injected by JS -->
      </main>

      <footer class="home-footer">
        <p class="footer-text">Student Project Showcase &mdash; <span id="year"></span></p>
        <button class="teacher-zone-btn" id="teacherZoneBtn">Teacher Zone 🔐</button>
      </footer>
    </div>
  </div>

  <script src="app.js"></script>
